<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Ledger</title>
    <meta name="description" content="Site Ledger - An offline-first ledger app for construction sites to track expenses, materials, and labor." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Site Ledger" />
    <meta property="og:description" content="An offline-first ledger app for construction sites to track expenses, materials, and labor." />
    <meta property="og:image" content="/icon.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Site Ledger" />
    <meta property="twitter:description" content="An offline-first ledger app for construction sites to track expenses, materials, and labor." />
    <meta property="twitter:image" content="/icon.png" />
    <script>
      // Catch and suppress all unhandled exceptions and promise rejections to prevent them from bubbling up to the parent window
      // as cross-origin "Script error" messages during automated workspace checks, while still logging them clearly for debugging.
      window.onerror = function (message, source, lineno, colno, error) {
        console.warn('Caught and suppressed unhandled exception:', message, 'at', source, 'line', lineno, 'col', colno, error);
        return true; // Tells the browser the error has been handled, preventing bubbling to the parent frame
      };

      window.addEventListener('error', function (event) {
        console.warn('Caught and suppressed error event:', event.message || event, event);
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
      }, true);

      window.addEventListener('unhandledrejection', function (event) {
        console.warn('Caught and suppressed unhandled promise rejection:', event.reason);
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
